# Cau hinh dac biet cho profile "test"
# Spring Boot tu dong load khi @ActiveProfiles("test")
spring:
  datasource:
    url: jdbc:h2:mem:beeacademy_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false

logging:
  level:
    root: WARN
    com.beeacademy: DEBUG
    org.springframework.security: WARN
